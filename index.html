<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receitas de Família - Caderno da Vovó 👵❤️</title>
    
    <!-- PWA & Mobile Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2E1B10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/app_icon.jpg" />
    <link rel="icon" type="image/jpeg" href="/app_icon.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration Bypass / Unregister -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (const registration of registrations) {
            registration.unregister();
            console.log('Service Worker removido para atualizar o app...');
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then((keys) => {
          for (const key of keys) {
            caches.delete(key);
            console.log('Cache limpo:', key);
          }
        });
      }
    </script>
  </body>
</html>
